<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timer Settings</title>
  <style>
    :root {
      --primary-color: #6200ea;
      --secondary-color: #03dac6;
      --background-color: #121212;
      --surface-color: #1e1e1e;
      --error-color: #cf6679;
      --on-background: #ffffff;
      --on-surface: #e0e0e0;
    }
    body {
      margin: 0;
      padding: 20px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--background-color);
      color: var(--on-background);
      max-width: 400px;
      margin: 0 auto;
    }
    h2 { font-weight: 600; }
    .card {
      background-color: var(--surface-color);
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    label { display: block; margin-bottom: 8px; font-weight: bold; }
    .desc { color: #aaa; font-size: 0.85rem; margin-bottom: 10px; }
    input[type="number"], input[type="password"] {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #333;
      background-color: #2c2c2c;
      color: var(--on-background);
      font-size: 1rem;
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 10px;
    }
    .checkbox-group { display: flex; align-items: center; margin-bottom: 10px; }
    .checkbox-group input { margin-right: 10px; transform: scale(1.2); }
    button {
      padding: 12px;
      background-color: var(--primary-color);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    button:hover { opacity: 0.9; }
    #status { color: var(--secondary-color); text-align: center; margin-top: 10px; font-weight: bold; height: 20px;}
  </style>
</head>
<body>
  <h2>Settings</h2>
  
  <div class="card">
    <div class="checkbox-group">
      <input type="checkbox" id="pinMode" />
      <label for="pinMode" style="margin-bottom: 0;">Enable PIN Mode</label>
    </div>
    <div class="desc">Require a PIN to start a timer or add more time.</div>
    <div id="pinSettings" style="display: none;">
      <label for="pinInput">Set a 4-digit PIN</label>
      <input type="password" id="pinInput" placeholder="e.g. 1234" maxlength="4" />
    </div>
  </div>

  <div class="card">
    <div class="checkbox-group">
      <input type="checkbox" id="cooldownMode" />
      <label for="cooldownMode" style="margin-bottom: 0;">Enable Cooldown Mode</label>
    </div>
    <div class="desc">Force a waiting period before another timer can be started.</div>
    <div id="cooldownSettings" style="display: none;">
      <label for="cooldownTime">Cooldown Duration (minutes)</label>
      <input type="number" id="cooldownTime" placeholder="e.g. 5" min="1" />
    </div>
  </div>

  <button id="saveBtn">Save Settings</button>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
